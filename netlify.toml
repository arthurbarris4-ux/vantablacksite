[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/AREA-MEMBROS-SETUP.md"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/supabase-schema.sql"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/package.json"
  to = "/index.html"
  status = 404
